<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Linux 2.0 - Sitio Oficial</title>
    <style>
        body {
            background-color: #0f172a;
            color: #cbd5e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-title {
            color: #38bdf8; /* El azulito que te gustó */
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Contenedor de la estructura principal */
        .grid-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            max-width: 1000px;
            width: 90%;
            margin-bottom: 40px;
        }

        /* Las dos bromas/bloques de los lados */
        .side-box {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #38bdf8; /* Le puse el mismo azulito al borde para que resalte más */
            width: 250px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .side-box h2 {
            color: #38bdf8; /* El azulito en los subtítulos */
            font-size: 1.3rem;
            margin-top: 0;
        }

        .side-box p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #94a3b8;
        }

        /* El átomo gris en el centro con animación */
        .atom-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: atomRotate 20s linear infinite; /* Esto hace que todo el átomo gire suavemente */
        }

        /* Núcleo del átomo */
        .atom-center {
            width: 20px;
            height: 20px;
            background-color: #788292;
            border-radius: 50%;
            box-shadow: 0 0 12px #64748b;
        }

        /* Órbitas del átomo en color gris */
        .orbit {
            position: absolute;
            border: 2px solid #64748b;
            border-radius: 50%;
            width: 140px;
            height: 45px;
        }

        .orbit:nth-child(1) { transform: rotate(0deg); }
        .orbit:nth-child(2) { transform: rotate(60deg); }
        .orbit:nth-child(3) { transform: rotate(120deg); }

        /* Animación para que gire */
        @keyframes atomRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
